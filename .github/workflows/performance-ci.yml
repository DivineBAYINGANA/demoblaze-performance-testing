name: Performance Testing CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  jmeter-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install JMeter
        run: |
          wget -q https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-5.6.3.tgz
          tar -xzf apache-jmeter-5.6.3.tgz
          echo "$PWD/apache-jmeter-5.6.3/bin" >> $GITHUB_PATH

      - name: Run JMeter Performance Tests
        run: |
          # FIX 1: Always wipe and recreate the reports folder before running.
          # JMeter refuses to write the HTML dashboard to a non-empty directory.
          rm -rf reports
          mkdir -p reports

          jmeter -n \
            -t test-plan/DemoBlaze_Performance_Test_fixed.jmx \
            -l result2.jtl \
            -e -o ./reports/

      - name: Upload Test Report Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jmeter-html-report
          path: ./reports/
          retention-days: 7

      - name: Send Email Notification
        uses: dawidd6/action-send-mail@v3
        if: always()
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "JMeter Performance Test - ${{ job.status }} | Run #${{ github.run_number }}"
          html_body: |
            <h2>JMeter Performance Test Results</h2>
            <p>Status: <b>${{ job.status }}</b></p>
            <p>Repository: <b>${{ github.repository }}</b></p>
            <p>Branch: <b>${{ github.ref_name }}</b></p>
            <p>Run number: <b>#${{ github.run_number }}</b></p>
            <hr/>
            <p>
              The full HTML Dashboard report has been uploaded as a downloadable artifact
              on GitHub Actions and will be retained for 7 days.
            </p>
            <p>
              <a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}">
                Click here to view the run and download the HTML report
              </a>
            </p>
          to: ${{ secrets.NOTIFICATION_EMAIL }}
          from: "GitHub Actions <${{ secrets.EMAIL_USERNAME }}>"