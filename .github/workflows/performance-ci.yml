name: Performance Testing CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  jmeter-tests:
    runs-on: ubuntu-latest
    # ⚠️  Total runtime: ~40 min (baseline ~3min, load ~6min,
    #     stress ~8min, endurance 30min). Do not cancel early.

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install JMeter
        run: |
          wget -q https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-5.6.3.tgz
          tar -xzf apache-jmeter-5.6.3.tgz
          echo "$PWD/apache-jmeter-5.6.3/bin" >> $GITHUB_PATH

      # ── Helper script: enable one TG, disable all others ──────
      # We parse the JMX as XML and flip enabled="true/false" on
      # each ThreadGroup element by matching its testname attribute.
      - name: Create TG switcher script
        run: |
          cat > switch_tg.py << 'PYEOF'
          import sys
          import re

          jmx_path = sys.argv[1]
          target_tg = sys.argv[2]   # e.g. "TG-1 Baseline (50 Users)"

          with open(jmx_path, "r", encoding="utf-8") as f:
              content = f.read()

          # Match every ThreadGroup opening tag and flip enabled attribute
          def replace_tg(match):
              tag = match.group(0)
              name_match = re.search(r'testname="([^"]+)"', tag)
              if not name_match:
                  return tag
              name = name_match.group(1)
              if target_tg in name:
                  tag = re.sub(r'enabled="(true|false)"', 'enabled="true"', tag)
              else:
                  tag = re.sub(r'enabled="(true|false)"', 'enabled="false"', tag)
              return tag

          content = re.sub(
              r'<ThreadGroup[^>]+testname="[^"]*TG-[^"]*"[^>]*>',
              replace_tg,
              content
          )

          with open(jmx_path, "w", encoding="utf-8") as f:
              f.write(content)

          print(f"Enabled: {target_tg}")
          PYEOF

      # ════════════════════════════════════════════════════════
      # PHASE 1 — BASELINE (50 users, 3 loops)
      # ════════════════════════════════════════════════════════
      - name: "Phase 1 — Baseline Test (50 Users)"
        run: |
          python3 switch_tg.py \
            test-plan/DemoBlaze_Performance_Test_fixed.jmx \
            "TG-1 Baseline"
          rm -rf reports/baseline && mkdir -p reports/baseline
          jmeter -n \
            -t test-plan/DemoBlaze_Performance_Test_fixed.jmx \
            -l results_baseline.jtl \
            -e -o ./reports/baseline/

      # ════════════════════════════════════════════════════════
      # PHASE 2 — LOAD TEST (150 users, 3 loops)
      # ════════════════════════════════════════════════════════
      - name: "Phase 2 — Load Test (150 Users)"
        run: |
          python3 switch_tg.py \
            test-plan/DemoBlaze_Performance_Test_fixed.jmx \
            "TG-2 Load Test"
          rm -rf reports/load && mkdir -p reports/load
          jmeter -n \
            -t test-plan/DemoBlaze_Performance_Test_fixed.jmx \
            -l results_load.jtl \
            -e -o ./reports/load/

      # ════════════════════════════════════════════════════════
      # PHASE 3 — STRESS TEST (500 users, 2 loops)
      # ════════════════════════════════════════════════════════
      - name: "Phase 3 — Stress Test (500 Users)"
        run: |
          python3 switch_tg.py \
            test-plan/DemoBlaze_Performance_Test_fixed.jmx \
            "TG-4 Stress Test"
          rm -rf reports/stress && mkdir -p reports/stress
          jmeter -n \
            -t test-plan/DemoBlaze_Performance_Test_fixed.jmx \
            -l results_stress.jtl \
            -e -o ./reports/stress/

      # ════════════════════════════════════════════════════════
      # PHASE 4 — ENDURANCE TEST (50 users, 30 minutes)
      # ════════════════════════════════════════════════════════
      - name: "Phase 4 — Endurance Test (50 Users, 30 min)"
        run: |
          python3 switch_tg.py \
            test-plan/DemoBlaze_Performance_Test_fixed.jmx \
            "TG-5 Endurance Test"
          rm -rf reports/endurance && mkdir -p reports/endurance
          jmeter -n \
            -t test-plan/DemoBlaze_Performance_Test_fixed.jmx \
            -l results_endurance.jtl \
            -e -o ./reports/endurance/

      # ════════════════════════════════════════════════════════
      # BUILD LANDING PAGE + PARSE ALL JTL FILES
      # ════════════════════════════════════════════════════════
      - name: Parse all JTL results and build index page
        if: always()
        run: |
          python3 << 'EOF'
          import csv, os, json
          from collections import defaultdict

          PHASES = [
              ("baseline",  "Baseline Test",  "50 users, 3 loops",   "#2563eb"),
              ("load",      "Load Test",       "150 users, 3 loops",  "#7c3aed"),
              ("stress",    "Stress Test",     "500 users, 2 loops",  "#dc2626"),
              ("endurance", "Endurance Test",  "50 users, 30 min",    "#059669"),
          ]

          def parse_jtl(path):
              stats = defaultdict(lambda: {"total":0,"pass":0,"fail":0,"times":[]})
              try:
                  with open(path, newline='', encoding='utf-8') as f:
                      for row in csv.DictReader(f):
                          label = row.get("label","Unknown").strip()
                          ok = row.get("success","true").strip().lower() == "true"
                          stats[label]["total"] += 1
                          stats[label]["times"].append(int(row.get("elapsed",0)))
                          if ok: stats[label]["pass"] += 1
                          else:  stats[label]["fail"] += 1
              except FileNotFoundError:
                  pass
              return stats

          def summarise(stats):
              grand_total = sum(v["total"] for v in stats.values())
              grand_pass  = sum(v["pass"]  for v in stats.values())
              grand_fail  = sum(v["fail"]  for v in stats.values())
              all_times   = [t for v in stats.values() for t in v["times"]]
              avg  = int(sum(all_times)/len(all_times)) if all_times else 0
              s    = sorted(all_times)
              p90  = s[int(len(s)*0.90)] if s else 0
              p95  = s[int(len(s)*0.95)] if s else 0
              err  = round(grand_fail/grand_total*100,2) if grand_total else 0
              ok   = err <= 1.0 and avg <= 2000
              return dict(total=grand_total, passed=grand_pass, failed=grand_fail,
                          avg=avg, p90=p90, p95=p95, error_rate=err, ok=ok)

          # ── Build phase cards for index page ──────────────────
          cards_html = ""
          all_phase_data = {}

          for phase_id, phase_name, config, color in PHASES:
              jtl = f"results_{phase_id}.jtl"
              stats = parse_jtl(jtl)
              s = summarise(stats)
              all_phase_data[phase_id] = {**s, "name": phase_name, "config": config, "color": color}

              status_txt  = "PASS" if s["ok"] else "FAIL"
              status_bg   = "#dcfce7" if s["ok"] else "#fee2e2"
              status_col  = "#16a34a" if s["ok"] else "#dc2626"
              border_col  = "#bbf7d0" if s["ok"] else "#fecaca"

              cards_html += f"""
              <div style="border:1px solid {border_col};border-radius:12px;overflow:hidden;background:white;box-shadow:0 1px 4px rgba(0,0,0,0.07);">
                <div style="background:{color};padding:16px 20px;display:flex;justify-content:space-between;align-items:center;">
                  <div>
                    <div style="color:white;font-size:17px;font-weight:700;">{phase_name}</div>
                    <div style="color:rgba(255,255,255,0.8);font-size:12px;margin-top:2px;">{config}</div>
                  </div>
                  <span style="background:{status_bg};color:{status_col};padding:4px 14px;border-radius:20px;font-size:12px;font-weight:700;">{status_txt}</span>
                </div>
                <div style="padding:16px 20px;">
                  <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:14px;">
                    <div style="text-align:center;background:#f9fafb;border-radius:8px;padding:10px;">
                      <div style="font-size:22px;font-weight:700;color:#16a34a;">{s["passed"]}</div>
                      <div style="font-size:11px;color:#6b7280;margin-top:2px;">PASSED</div>
                    </div>
                    <div style="text-align:center;background:#f9fafb;border-radius:8px;padding:10px;">
                      <div style="font-size:22px;font-weight:700;color:#dc2626;">{s["failed"]}</div>
                      <div style="font-size:11px;color:#6b7280;margin-top:2px;">FAILED</div>
                    </div>
                    <div style="text-align:center;background:#f9fafb;border-radius:8px;padding:10px;">
                      <div style="font-size:22px;font-weight:700;color:#374151;">{s["total"]}</div>
                      <div style="font-size:11px;color:#6b7280;margin-top:2px;">TOTAL</div>
                    </div>
                  </div>
                  <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;margin-bottom:14px;font-size:12px;">
                    <div style="text-align:center;">
                      <div style="font-weight:700;color:#374151;">{s["avg"]}ms</div>
                      <div style="color:#9ca3af;">Avg RT</div>
                    </div>
                    <div style="text-align:center;">
                      <div style="font-weight:700;color:#374151;">{s["p90"]}ms</div>
                      <div style="color:#9ca3af;">P90</div>
                    </div>
                    <div style="text-align:center;">
                      <div style="font-weight:700;color:#374151;">{s["p95"]}ms</div>
                      <div style="color:#9ca3af;">P95</div>
                    </div>
                    <div style="text-align:center;">
                      <div style="font-weight:700;color:#374151;">{s["error_rate"]}%</div>
                      <div style="color:#9ca3af;">Error Rate</div>
                    </div>
                  </div>
                  <a href="./{phase_id}/"
                     style="display:block;text-align:center;background:{color};color:white;padding:9px;border-radius:6px;text-decoration:none;font-size:13px;font-weight:600;">
                    View Full Dashboard →
                  </a>
                </div>
              </div>"""

          # ── Overall pass/fail banner ───────────────────────────
          all_ok = all(d["ok"] for d in all_phase_data.values())
          banner_bg  = "#16a34a" if all_ok else "#dc2626"
          banner_txt = "All SLAs Met" if all_ok else "SLA Violations Detected"
          banner_icon = "✅" if all_ok else "❌"

          index_html = f"""<!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width,initial-scale=1">
            <title>DemoBlaze Performance Report</title>
            <style>
              *{{box-sizing:border-box;margin:0;padding:0;}}
              body{{font-family:Arial,sans-serif;background:#f1f5f9;color:#1e293b;}}
              .header{{background:{banner_bg};color:white;padding:32px;text-align:center;}}
              .header h1{{font-size:26px;margin-bottom:6px;}}
              .header p{{opacity:.9;font-size:14px;}}
              .meta{{background:white;border-bottom:1px solid #e2e8f0;padding:14px 32px;display:flex;gap:32px;flex-wrap:wrap;}}
              .meta span{{font-size:13px;color:#64748b;}}
              .meta strong{{color:#1e293b;}}
              .sla-bar{{background:#fffbeb;border-bottom:1px solid #fde68a;padding:10px 32px;font-size:13px;color:#92400e;text-align:center;}}
              .grid{{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:20px;padding:28px 32px;max-width:1200px;margin:0 auto;}}
              .footer{{text-align:center;padding:20px;font-size:12px;color:#94a3b8;border-top:1px solid #e2e8f0;background:white;margin-top:12px;}}
            </style>
          </head>
          <body>
            <div class="header">
              <div style="font-size:40px;margin-bottom:10px;">{banner_icon}</div>
              <h1>DemoBlaze Performance Test Report</h1>
              <p>{banner_txt} &nbsp;|&nbsp; Apache JMeter 5.6.3 &nbsp;|&nbsp; Java 21</p>
            </div>
            <div class="meta">
              <span><strong>Prepared by:</strong> Divine GIHOZO BAYINGANA</span>
              <span><strong>Organisation:</strong> AmaliTech Training Academy — Team 1</span>
              <span><strong>Target:</strong> https://www.demoblaze.com</span>
              <span><strong>Tool:</strong> Apache JMeter 5.6.3</span>
            </div>
            <div class="sla-bar">
              SLA Targets &nbsp;|&nbsp; Avg Response &lt; 2,000ms &nbsp;|&nbsp;
              Error Rate &le; 1% &nbsp;|&nbsp; P90 &lt; 3,000ms &nbsp;|&nbsp; P95 &lt; 3,000ms
            </div>
            <div class="grid">
              {cards_html}
            </div>
            <div class="footer">
              AmaliTech Training Academy — Team 1 &nbsp;|&nbsp; Divine GIHOZO BAYINGANA &nbsp;|&nbsp;
              Generated by GitHub Actions CI/CD
            </div>
          </body>
          </html>"""

          os.makedirs("reports", exist_ok=True)
          with open("reports/index.html", "w") as f:
              f.write(index_html)

          # Save summary for email step
          with open("phase_summary.json", "w") as f:
              json.dump(all_phase_data, f)

          print("Index page and phase summary written.")
          EOF

      # ── Build detailed email ───────────────────────────────────
      - name: Build Email Body
        if: always()
        run: |
          python3 << 'EOF'
          import json, os

          try:
              with open("phase_summary.json") as f:
                  phases = json.load(f)
          except FileNotFoundError:
              phases = {}

          REPO_OWNER = os.environ.get("GITHUB_REPOSITORY_OWNER","")
          REPO_NAME  = os.environ.get("GITHUB_REPOSITORY","").split("/")[-1]
          RUN_ID     = os.environ.get("GITHUB_RUN_ID","")
          RUN_NUM    = os.environ.get("GITHUB_RUN_NUMBER","")
          REF        = os.environ.get("GITHUB_REF_NAME","")
          SERVER     = os.environ.get("GITHUB_SERVER_URL","https://github.com")
          REPO_FULL  = os.environ.get("GITHUB_REPOSITORY","")

          PAGES_URL = f"https://{REPO_OWNER}.github.io/{REPO_NAME}/"
          RUN_URL   = f"{SERVER}/{REPO_FULL}/actions/runs/{RUN_ID}"

          all_ok = all(d.get("ok", False) for d in phases.values()) if phases else False
          banner_color = "#16a34a" if all_ok else "#dc2626"
          banner_icon  = "✅" if all_ok else "❌"
          banner_text  = "All SLAs Met" if all_ok else "SLA Violations Detected"

          # Phase rows
          phase_cards = ""
          phase_order = [
              ("baseline",  "Baseline Test",  "50 users · 3 loops"),
              ("load",      "Load Test",       "150 users · 3 loops"),
              ("stress",    "Stress Test",     "500 users · 2 loops"),
              ("endurance", "Endurance Test",  "50 users · 30 min"),
          ]
          colors = {"baseline":"#2563eb","load":"#7c3aed","stress":"#dc2626","endurance":"#059669"}

          for pid, pname, pconfig in phase_order:
              d = phases.get(pid, {})
              ok = d.get("ok", False)
              color = colors[pid]
              sbg  = "#dcfce7" if ok else "#fee2e2"
              scol = "#16a34a" if ok else "#dc2626"
              stxt = "PASS"   if ok else "FAIL"

              phase_cards += f"""
              <div style="border:1px solid #e5e7eb;border-radius:10px;overflow:hidden;margin-bottom:16px;">
                <div style="background:{color};padding:12px 18px;display:flex;justify-content:space-between;align-items:center;">
                  <div>
                    <span style="color:white;font-size:15px;font-weight:700;">{pname}</span>
                    <span style="color:rgba(255,255,255,0.75);font-size:12px;margin-left:10px;">{pconfig}</span>
                  </div>
                  <span style="background:{sbg};color:{scol};padding:3px 12px;border-radius:20px;font-size:12px;font-weight:700;">{stxt}</span>
                </div>
                <div style="background:white;padding:14px 18px;">
                  <table style="width:100%;border-collapse:collapse;font-size:13px;">
                    <tr>
                      <td style="padding:6px 10px;text-align:center;background:#f0fdf4;border-radius:6px;">
                        <div style="font-size:20px;font-weight:700;color:#16a34a;">{d.get("passed","—")}</div>
                        <div style="font-size:11px;color:#16a34a;">Passed</div>
                      </td>
                      <td style="width:8px;"></td>
                      <td style="padding:6px 10px;text-align:center;background:#fef2f2;border-radius:6px;">
                        <div style="font-size:20px;font-weight:700;color:#dc2626;">{d.get("failed","—")}</div>
                        <div style="font-size:11px;color:#dc2626;">Failed</div>
                      </td>
                      <td style="width:8px;"></td>
                      <td style="padding:6px 10px;text-align:center;background:#f9fafb;border-radius:6px;">
                        <div style="font-size:20px;font-weight:700;color:#374151;">{d.get("total","—")}</div>
                        <div style="font-size:11px;color:#6b7280;">Total</div>
                      </td>
                      <td style="width:8px;"></td>
                      <td style="padding:6px 10px;text-align:center;background:#f9fafb;border-radius:6px;">
                        <div style="font-size:20px;font-weight:700;color:#374151;">{d.get("avg","—")}ms</div>
                        <div style="font-size:11px;color:#6b7280;">Avg RT</div>
                      </td>
                      <td style="width:8px;"></td>
                      <td style="padding:6px 10px;text-align:center;background:#f9fafb;border-radius:6px;">
                        <div style="font-size:20px;font-weight:700;color:#374151;">{d.get("p90","—")}ms</div>
                        <div style="font-size:11px;color:#6b7280;">P90</div>
                      </td>
                      <td style="width:8px;"></td>
                      <td style="padding:6px 10px;text-align:center;background:#f9fafb;border-radius:6px;">
                        <div style="font-size:20px;font-weight:700;color:#374151;">{d.get("error_rate","—")}%</div>
                        <div style="font-size:11px;color:#6b7280;">Error Rate</div>
                      </td>
                    </tr>
                  </table>
                  <div style="margin-top:10px;text-align:right;">
                    <a href="{PAGES_URL}{pid}/" style="font-size:12px;color:{color};text-decoration:none;font-weight:600;">
                      View {pname} Dashboard →
                    </a>
                  </div>
                </div>
              </div>"""

          html = f"""<!DOCTYPE html>
          <html><head><meta charset="UTF-8"></head>
          <body style="margin:0;padding:0;background:#f1f5f9;font-family:Arial,sans-serif;">
            <div style="max-width:680px;margin:24px auto;background:white;border-radius:10px;overflow:hidden;box-shadow:0 2px 16px rgba(0,0,0,0.09);">

              <div style="background:{banner_color};padding:28px 32px;text-align:center;">
                <div style="font-size:40px;margin-bottom:8px;">{banner_icon}</div>
                <h1 style="margin:0;color:white;font-size:22px;font-weight:700;">DemoBlaze Performance Test Report</h1>
                <p style="margin:8px 0 0;color:rgba(255,255,255,0.88);font-size:14px;">{banner_text}</p>
              </div>

              <div style="background:#f8fafc;border-bottom:1px solid #e2e8f0;padding:14px 28px;display:flex;flex-wrap:wrap;gap:20px;">
                <div><span style="font-size:11px;color:#94a3b8;display:block;">REPOSITORY</span><strong style="font-size:13px;">{REPO_FULL}</strong></div>
                <div><span style="font-size:11px;color:#94a3b8;display:block;">BRANCH</span><strong style="font-size:13px;">{REF}</strong></div>
                <div><span style="font-size:11px;color:#94a3b8;display:block;">RUN</span><strong style="font-size:13px;">#{RUN_NUM}</strong></div>
                <div><span style="font-size:11px;color:#94a3b8;display:block;">TOOL</span><strong style="font-size:13px;">JMeter 5.6.3 / Java 21</strong></div>
              </div>

              <div style="padding:24px 28px;">

                <div style="background:#fffbeb;border:1px solid #fde68a;border-radius:8px;padding:12px 16px;margin-bottom:22px;font-size:13px;color:#92400e;">
                  <strong>SLA Targets:</strong> &nbsp;
                  Avg Response &lt; 2,000ms &nbsp;|&nbsp;
                  Error Rate &le; 1% &nbsp;|&nbsp;
                  P90 &lt; 3,000ms
                </div>

                <h2 style="font-size:15px;font-weight:700;color:#1e293b;margin:0 0 14px;">Test Phase Results</h2>
                {phase_cards}

                <div style="text-align:center;margin-top:24px;margin-bottom:4px;">
                  <a href="{PAGES_URL}"
                     style="display:inline-block;background:#2563eb;color:white;padding:12px 32px;border-radius:6px;text-decoration:none;font-weight:700;font-size:14px;margin-right:10px;">
                    View All Reports
                  </a>
                  <a href="{RUN_URL}"
                     style="display:inline-block;background:#475569;color:white;padding:12px 32px;border-radius:6px;text-decoration:none;font-weight:700;font-size:14px;">
                    Workflow Logs
                  </a>
                </div>

              </div>

              <div style="background:#f8fafc;border-top:1px solid #e2e8f0;padding:14px 28px;text-align:center;">
                <p style="margin:0;font-size:12px;color:#94a3b8;">
                  AmaliTech Training Academy — Team 1 &nbsp;|&nbsp; Divine GIHOZO BAYINGANA
                </p>
              </div>
            </div>
          </body></html>"""

          with open("email_body.html", "w") as f:
              f.write(html)

          # Write overall status to env
          env_file = os.environ.get("GITHUB_ENV", "/dev/null")
          with open(env_file, "a") as f:
              f.write(f"OVERALL_STATUS={'PASS' if all_ok else 'FAIL'}\n")

          print("Email body written.")
          EOF

      # ── Upload all reports as one artifact ────────────────────
      - name: Upload All Reports as Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jmeter-all-reports
          path: ./reports/
          retention-days: 7

      # ── Deploy to GitHub Pages ─────────────────────────────────
      # Deploys the entire reports/ folder.
      # Result:
      #   /            → landing page with all 4 phase cards
      #   /baseline/   → Baseline JMeter HTML dashboard
      #   /load/       → Load Test JMeter HTML dashboard
      #   /stress/     → Stress Test JMeter HTML dashboard
      #   /endurance/  → Endurance Test JMeter HTML dashboard
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./reports
          publish_branch: gh-pages
          force_orphan: true
          commit_message: "ci: publish all phase reports — run #${{ github.run_number }}"

      # ── Send combined email ───────────────────────────────────
      - name: Send Email Notification
        uses: dawidd6/action-send-mail@v3
        if: always()
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "[${{ env.OVERALL_STATUS }}] DemoBlaze Performance Report — Run #${{ github.run_number }} | ${{ github.ref_name }}"
          html_body: file://email_body.html
          to: ${{ secrets.NOTIFICATION_EMAIL }}
          from: "GitHub Actions <${{ secrets.EMAIL_USERNAME }}>"